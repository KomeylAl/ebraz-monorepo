x-app-image: &app-image ebraz-clinic-app:latest

x-app-build: &app-build
  context: .
  dockerfile: Dockerfile
  target: runner
  args:
    NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}

services:
  # Lightweight image (no Next.js build) — build alone:
  #   docker compose build migrate
  #   docker compose run --rm migrate
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
    command: pnpm --filter @ebraz/database run db:migrate:docker
    restart: "no"

  # Full app image — build once, reused by website/admin/therapist/client:
  #   docker compose build api
  #   docker compose up -d api
  #   docker compose up -d website admin therapist client
  api:
    build: *app-build
    image: *app-image
    env_file: .env
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      UPLOAD_ROOT: /app/packages/api/public/uploads
    volumes:
      - uploads_data:/app/packages/api/public/uploads
      - backups_data:/app/packages/api/public/backups
    command: pnpm --filter @ebraz/api exec next start --port 4000
    depends_on:
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  website:
    image: *app-image
    env_file: .env
    ports:
      - "${WEBSITE_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    command: pnpm --filter @ebraz/website exec next start --port 3000
    depends_on:
      - api
    restart: unless-stopped

  admin:
    image: *app-image
    env_file: .env
    ports:
      - "${ADMIN_PORT:-3001}:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
      HOSTNAME: 0.0.0.0
    command: pnpm --filter @ebraz/admin-panel exec next start --port 3001
    depends_on:
      - api
    restart: unless-stopped

  therapist:
    image: *app-image
    env_file: .env
    ports:
      - "${THERAPIST_PORT:-3002}:3002"
    environment:
      NODE_ENV: production
      PORT: 3002
      HOSTNAME: 0.0.0.0
    command: pnpm --filter @ebraz/therapist-panel exec next start --port 3002
    depends_on:
      - api
    restart: unless-stopped

  client:
    image: *app-image
    env_file: .env
    ports:
      - "${CLIENT_PORT:-3003}:3003"
    environment:
      NODE_ENV: production
      PORT: 3003
      HOSTNAME: 0.0.0.0
    command: pnpm --filter @ebraz/client-panel exec next start --port 3003
    depends_on:
      - api
    restart: unless-stopped

  seed:
    profiles: ["seed"]
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL in .env}
      SEED_DEV_USERS: "false"
    command: >
      sh -c "pnpm --filter @ebraz/database run db:migrate:docker
      && pnpm --filter @ebraz/database run db:seed:docker"
    restart: "no"

volumes:
  uploads_data:
  backups_data:
